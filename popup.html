<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: sans-serif;
      margin: 10px;
      width: 300px;
    }
    #core-ui {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ccc;
    }
    .module-fragment {
      margin: 8px 0;
      padding: 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fafafa;
    }
    .module-link {
      display: block;
      margin: 6px 0;
      padding: 6px;
      background: #eee;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="core-ui">
    <h3>WCO Substrate</h3>
    <button id="open-substrate">Open Substrate Console</button>
    <button id="open-advanced">Open Advanced Console</button>
    <button id="reload-modules">Reload Modules</button>

    <h4>Loaded Modules</h4>
    <ul id="module-list"></ul>
  </div>

  <div id="module-fragments"></div>

  <h4>Module Pages</h4>
  <div id="module-pages"></div>

  <script src="popup.js"></script>
</body>
</html>
